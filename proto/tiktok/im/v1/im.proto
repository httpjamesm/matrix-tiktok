syntax = "proto2";

package tiktok.im.v1;

option go_package = "github.com/httpjamesm/matrix-tiktok/pkg/libtiktok/pb;tiktokpb";

// Reverse-engineered TikTok web IM protobuf schema.
//
// This file intentionally prefers "known-good wire compatibility" over perfect
// naming. Many field names come from observed behavior in the current client;
// fields whose semantics are only partially understood stay conservatively
// named as reserved_* until traffic captures justify something more specific.
//
// We keep proto2 so field presence and unknown-field preservation remain
// available while the schema is still being mapped.

// Empty embedded message used for field 4 in the common request envelope.
message EmptyMessage {}

// Generic metadata pair used by the REST request envelope at repeated field 15.
//
// Examples include browser/device properties, cookies mirrored as metadata, and
// tt-ticket-guard keys for authenticated send/reaction calls.
message MetadataKV {
  optional string key = 1;
  optional string value = 2;
}

// Common REST request envelope for the type-2059 media upload config call.
message MediaUploadConfigRequest {
  optional uint64 message_type = 1;
  optional uint64 sub_command = 2;
  optional string client_version = 3;
  optional EmptyMessage options = 4;
  optional uint64 platform_flag = 5;
  optional uint64 reserved_6 = 6;
  optional string git_hash = 7;
  optional MediaUploadConfigRequestPayload payload = 8;
  optional string device_id = 9;
  optional string client_platform = 11;
  repeated MetadataKV metadata = 15;
  optional uint64 final_flag = 18;
}

// Request payload for POST /v1/media/upload_config.
//
// Captures show field 2059 present with an empty string payload.
message MediaUploadConfigRequestPayload {
  optional string imagex = 2059;
}

// Response envelope for POST /v1/media/upload_config.
//
// Only the image-upload branch (field 6 -> 2059) is modeled for now.
message MediaUploadConfigResponse {
  optional uint64 reserved_1 = 1;
  optional uint64 reserved_2 = 2;
  optional uint64 reserved_3 = 3;
  optional string message = 4;
  optional uint64 reserved_5 = 5;
  optional MediaUploadConfigPayload payload = 6;
  optional string request_id = 7;
  optional uint64 reserved_10 = 10;
  optional uint64 reserved_11 = 11;
  optional string region_name = 14;
  optional uint64 user_id = 15;
}

message MediaUploadConfigPayload {
  optional MediaUploadConfigList imagex = 2059;
}

message MediaUploadConfigList {
  repeated MediaUploadConfigEntry entries = 1;
}

message MediaUploadConfigEntry {
  // 1 = ImageX image upload, 2 = VOD upload in current captures.
  optional uint64 upload_kind = 1;
  optional string service_id = 2;
  optional string host = 3;
  optional uint64 expires_at_ms = 4;
  optional uint64 issued_at_ms = 5;
  // AccessKeyId used in the Authorization credential scope.
  optional string access_key_id = 6;
  // Base64-encoded STS response, echoed directly as x-amz-security-token.
  optional string security_token = 7;
  // SecretAccessKey passed into TikTok's request signer.
  optional string secret_access_key = 8;
}

// Generic tag/value pair used inside message bodies.
//
// Known keys include:
// - "s:mentioned_users"
// - "s:client_message_id"
//
// The value is bytes because TikTok sometimes stores an embedded message here
// (for example the empty mentioned-users payload) and sometimes plain text.
message MetadataTag {
  optional string key = 1;
  optional bytes value = 2;
}

// Common REST request envelope for the type-203 inbox bootstrap call.
//
// This wire shape is shared with other IM endpoints:
// - field 1: top-level message type
// - field 2: sub-command / identifier
// - field 3: client version ("1.6.0" in current captures)
// - field 4: empty options message
// - field 5: platform flag (3 = web_pc)
// - field 8: typed inner payload
// - field 15: repeated metadata key/value pairs
// - field 18: trailing flag currently sent as 1
message InboxRequest {
  // 203 = user_init_list / inbox bootstrap.
  optional uint64 message_type = 1;
  // Observed as 10001 for inbox bootstrap.
  optional uint64 sub_command = 2;
  optional string client_version = 3;
  optional EmptyMessage options = 4;
  // 3 = web_pc in current traffic.
  optional uint64 platform_flag = 5;
  optional uint64 reserved_6 = 6;
  // Present but empty in current traffic.
  optional string git_hash = 7;
  optional InboxRequestPayload payload = 8;
  optional string device_id = 9;
  optional string client_platform = 11;
  repeated MetadataKV metadata = 15;
  // Observed as 1 on all current IM REST requests.
  optional uint64 final_flag = 18;
}

// Typed payload wrapper for the type-203 request envelope.
message InboxRequestPayload {
  optional InboxInitRequest user_init_list = 203;
}

// Current inbox bootstrap inner body.
//
// The web client sends field 1 = 0 here.
message InboxInitRequest {
  optional uint64 reserved_1 = 1;
}

// Common response envelope used by the inbox endpoint.
message InboxResponse {
  // Server/application status code from the outer envelope.
  optional uint64 status = 1;
  // Endpoint-specific payload wrapper.
  optional InboxResponsePayload payload = 6;
}

// Typed payload wrapper for inbox responses.
message InboxResponsePayload {
  optional InboxConversationList user_init_list = 203;
}

// Repeated inbox conversation entries.
message InboxConversationList {
  repeated InboxConversationEntry entries = 1;
}

// Minimal subset of an inbox conversation entry currently used by the bridge.
//
// The client treats entries with only placeholder content as non-real inbox
// rows and drops them.
message InboxConversationEntry {
  // Format observed as "0:1:<userA>:<userB>" for direct messages.
  optional string conversation_id = 1;
  // Non-zero when the thread contains a real last message.
  optional uint64 last_message_type = 4;
  // Conversation source ID, reused by get_by_conversation and reactions.
  optional uint64 source_id = 5;
  // Raw preview bytes; "placeholder" indicates an empty stub row.
  optional bytes last_message_preview = 8;
}

// Common REST request envelope for the type-301 get_by_conversation call.
message GetByConversationRequest {
  // 301 = get_by_conversation.
  optional uint64 message_type = 1;
  // Observed as 1 for this endpoint.
  optional uint64 sub_command = 2;
  optional string client_version = 3;
  optional EmptyMessage options = 4;
  optional uint64 platform_flag = 5;
  optional uint64 reserved_6 = 6;
  // Present but empty in current traffic.
  optional string git_hash = 7;
  optional GetByConversationRequestPayload payload = 8;
  // Unlike inbox/send/reaction, the current request body does not include
  // device_id at field 9 in this client implementation.
  optional string client_platform = 11;
  repeated MetadataKV metadata = 15;
  optional uint64 final_flag = 18;
}

// Typed payload wrapper for the type-301 request envelope.
message GetByConversationRequestPayload {
  optional GetByConversationQuery query = 301;
}

// Query for one page of messages in a conversation.
message GetByConversationQuery {
  optional string conversation_id = 1;
  // 1 = fetch latest / default direction in current traffic.
  optional uint64 direction = 2;
  // Must match the conversation's source_id from the inbox response.
  optional uint64 source_id = 3;
  // Observed constant 1 in current traffic.
  optional uint64 reserved_4 = 4;
  // Pagination cursor in microseconds. Zero means first page.
  optional uint64 cursor_ts_us = 5;
  // Requested page size.
  optional uint64 count = 6;
}

// Common response envelope for the type-301 history endpoint.
message GetByConversationResponse {
  optional uint64 status = 1;
  optional GetByConversationResponsePayload payload = 6;
}

// Typed payload wrapper for history responses.
message GetByConversationResponsePayload {
  optional ConversationMessageList conversation = 301;
}

// Repeated message entries returned by get_by_conversation.
message ConversationMessageList {
  repeated ConversationMessageEntry entries = 1;
}

// Reply / quote attachment (field 18) on chat message bodies.
//
// Observed when aweType=703 (reply): field 1 is the referenced message's
// server_message_id; field 2 is a JSON object with refmsg_content, refmsg_uid,
// refmsg_sec_uid, refmsg_type, etc. Fields 3, 4, 7 appear in captures but are
// not fully interpreted here.
message MessageReplyReference {
  optional uint64 referenced_server_message_id = 1;
  optional bytes quoted_context_json = 2;
  optional uint64 refmsg_type = 3;
  optional uint64 reserved_4 = 4;
  optional uint64 refmsg_sender_user_id = 7;
}

// Localized string wrapper used in several sticker preview text slots.
message LocalizedText {
  optional string text = 1;
}

// Dimensions attached to a sticker asset.
message StickerAssetSize {
  optional uint64 width = 1;
  optional uint64 height = 2;
}

// Primary downloadable sticker asset.
message StickerAsset {
  // Internal CDN object path.
  optional string path = 1;
  // Signed absolute URL for fetching the sticker media.
  optional string url = 2;
  optional StickerAssetSize size = 5;
  optional uint64 reserved_7 = 7;
}

// Human-readable preview strings that accompany a sticker message.
//
// Captures commonly show:
// - field 2: "sent a sticker" / localized equivalent
// - field 3: "[sticker]" / localized equivalent
// field 1 exists too, but its semantics are less clear, so we keep a
// conservative name here.
message StickerDisplayTexts {
  optional LocalizedText reserved_1 = 1;
  optional LocalizedText sent_a_sticker = 2;
  optional LocalizedText bracketed_sticker = 3;
}

// Sticker-specific section nested under the outer message row's field 20.
message StickerMessagePayload {
  optional StickerAsset asset = 1;
  optional StickerDisplayTexts display_texts = 2;
}

// Outer message attachment container. Field 7 carries sticker payloads in the
// captures observed so far.
message MessageAttachmentPayload {
  optional StickerMessagePayload sticker = 7;
}

// One downloadable variant of a private DM media attachment.
//
// Field 1 is polymorphic in current captures: some rows carry the ASCII label
// ("full", "view", "play", "cover"), while others carry a small embedded
// message for the preview/thumb slot. We keep it as raw bytes to preserve both
// shapes without overcommitting to semantics we haven't fully verified yet.
message PrivateImageVariant {
  optional bytes label = 1;
  repeated string url = 2;
  // JSON metadata blob on observed private_video "play" variants.
  optional string metadata_json = 3;
  optional uint64 width = 20;
  optional uint64 height = 21;
  optional uint64 duration_ms = 22;
  optional uint64 reserved_23 = 23;
}

// Field 24 on chat message rows when message_subtype = "private_image" or
// "private_video".
//
// decrypt_key is the 32-byte AES-256-GCM key rendered as a hex string in
// current private_image captures. Those image URLs point to encrypted blobs:
// nonce (12 bytes) || ciphertext || tag (16 bytes). private_video captures use
// the same outer field but currently leave decrypt_key empty and carry playable
// video URLs instead.
message PrivateImageAttachment {
  optional string path = 1;
  optional uint64 reserved_2 = 2;
  optional string decrypt_key = 3;
  repeated PrivateImageVariant variants = 20;
}

// Minimal subset of a conversation message entry currently used by the bridge.
message ConversationMessageEntry {
  optional string conversation_id = 1;
  // Server-assigned numeric message ID.
  optional uint64 server_message_id = 3;
  // Message send timestamp in microseconds.
  optional uint64 timestamp_us = 4;
  // Observed on inner chat rows; required as send body field 3 when posting a reply (aweType 703).
  optional uint64 send_chain_id = 5;
  // Numeric sender user ID.
  optional uint64 sender_user_id = 7;
  // JSON message blob parsed separately by parseMessageContent.
  optional bytes content_json = 8;
  // Repeated message tags; s:client_message_id is the main one we use.
  repeated MetadataTag tags = 9;
  // Sender sec_uid (TikTok stable user token string).
  optional string sender_sec_uid = 14;
  // Repeated reaction summaries attached to the message.
  repeated ReactionSummary reactions = 15;
  // When present, this message is a reply; field 1 targets the parent server_message_id.
  optional MessageReplyReference message_reply = 18;
  // Outer attachment payload; field 7 currently carries sticker metadata.
  optional MessageAttachmentPayload attachment = 20;
  // Observed as "sticker", "private_image", and "private_video" in current captures.
  optional string message_subtype = 21;
  // Private DM media metadata (encrypted image URLs or direct video URLs).
  optional PrivateImageAttachment private_image = 24;
  // Pagination cursor carried on the entry; callers use the last one returned.
  optional uint64 cursor_ts_us = 25;
}

// Common REST request envelope for the type-100 send-message call.
message SendRequest {
  // 100 = send message.
  optional uint64 message_type = 1;
  // Observed as 10007 for send.
  optional uint64 sub_command = 2;
  optional string client_version = 3;
  optional EmptyMessage options = 4;
  optional uint64 platform_flag = 5;
  optional uint64 reserved_6 = 6;
  // Present but empty in current traffic.
  optional string git_hash = 7;
  optional SendRequestPayload payload = 8;
  optional string device_id = 9;
  optional string client_platform = 11;
  // Includes the tt-ticket-guard metadata required by the web client.
  repeated MetadataKV metadata = 15;
  optional uint64 final_flag = 18;
}

// Typed payload wrapper for the type-100 request envelope.
message SendRequestPayload {
  optional SendMessageBody send = 100;
}

// Inner chat message body for POST /v1/message/send.
//
// Current text-message wire shape:
// - field 1: conversation ID
// - field 2: 1 (message kind = text)
// - field 3: 0
// - field 4: JSON body {"aweType":0,"text":"..."}
// - field 5: repeated tags
//   - "s:mentioned_users" with an empty embedded message value
//   - "s:client_message_id" with the client UUID
// - field 6: 7
// - field 7: "deprecated"
// - field 8: client UUID echoed directly
// - field 11: present on aweType=703 replies (parent ref + quoted JSON)
message SendMessageReplyAttachment {
  optional uint64 referenced_server_message_id = 1;
  optional bytes reference_payload_json = 2;
  optional uint64 duplicate_referenced_server_message_id = 3;
  optional uint64 parent_cursor_ts_us = 4;
}

// Shared width/height pair used by outbound private-image payloads.
message SendMediaSize {
  optional uint64 width = 1;
  optional uint64 height = 2;
}

// One encrypted private-image asset reference inside the outbound send payload.
message SendPrivateImageAsset {
  optional string path = 1;
  optional SendMediaSize size = 5;
  optional string decrypt_key = 6;
  optional uint64 reserved_7 = 7;
}

// Localized preview texts shown in TikTok's DM list / quote previews.
message SendPrivateImageDisplayTexts {
  optional LocalizedText sender_preview = 1;
  optional LocalizedText recipient_preview = 2;
  optional LocalizedText bracketed_preview = 3;
}

// Additional key/value metadata attached to one outbound private image.
message SendPrivateImageMetadataEntry {
  optional string path = 1;
  repeated MetadataKV properties = 2;
}

message SendPrivateImageMetadataList {
  repeated SendPrivateImageMetadataEntry entries = 1;
}

// Field 13 -> 4 on outbound private-image sends.
message SendPrivateImageAttachmentPayload {
  repeated SendPrivateImageAsset assets = 1;
  optional SendPrivateImageDisplayTexts display_texts = 3;
  optional SendPrivateImageMetadataList metadata = 200;
}

message SendAttachmentPayload {
  optional SendPrivateImageAttachmentPayload private_image = 4;
}

// Compact attachment summary mirrored at field 17 on outbound private-image sends.
message SendPrivateImageFileInfo {
  optional uint64 width = 1;
  optional uint64 height = 2;
  optional uint64 reserved_3 = 3;
  optional uint64 size = 4;
  optional string file_name = 5;
}

message SendPrivateImageAttachmentSummary {
  optional uint64 reserved_1 = 1;
  optional string path = 2;
  optional string decrypt_key = 3;
  optional SendPrivateImageFileInfo file_info = 10;
}

message SendMessageBody {
  optional string conversation_id = 1;
  optional uint64 message_kind = 2;
  optional uint64 reserved_3 = 3;
  optional bytes content_json = 4;
  repeated MetadataTag tags = 5;
  optional uint64 reserved_6 = 6;
  optional string deprecated = 7;
  // Client-generated UUID v4 used for deduplication across REST and WS paths.
  optional string client_message_id = 8;
  optional SendMessageReplyAttachment message_reply = 11;
  optional SendAttachmentPayload attachment = 13;
  optional string message_subtype = 14;
  optional SendPrivateImageAttachmentSummary private_image = 17;
}

// Send-message response envelope.
//
// The server-assigned message ID has been observed in both:
// - field 6 -> field 100 -> field 1
// - field 8 -> field 100 -> field 1
//
// We model both locations and prefer field 6 when present.
message SendResponse {
  optional uint64 status = 1;
  optional SendResponsePayload primary = 6;
  optional SendResponsePayload fallback = 8;
}

// Payload wrapper around the echoed send response.
message SendResponsePayload {
  optional SendResponseBody send = 100;
}

// Minimal send response body.
message SendResponseBody {
  // Server-assigned message ID returned as a string.
  optional string message_id = 1;
}

// Common REST request envelope for the type-701 message-delete call.
//
// POST /v1/message/delete — observed without URL query parameters (unlike send
// and set_property, which attach ztca-dpop and related query keys).
message DeleteRequest {
  // 701 = delete message.
  optional uint64 message_type = 1;
  // Observed as 10007 for delete (same sub-command as send in current traffic).
  optional uint64 sub_command = 2;
  optional string client_version = 3;
  optional EmptyMessage options = 4;
  optional uint64 platform_flag = 5;
  optional uint64 reserved_6 = 6;
  // Present in some web captures; left empty when unknown.
  optional string git_hash = 7;
  optional DeleteRequestPayload payload = 8;
  optional string device_id = 9;
  optional string client_platform = 11;
  repeated MetadataKV metadata = 15;
  optional uint64 final_flag = 18;
}

// Typed payload wrapper for the type-701 request envelope.
message DeleteRequestPayload {
  optional DeleteMessageBody delete = 701;
}

// Inner body for POST /v1/message/delete (field 8 → 701).
message DeleteMessageBody {
  optional string conversation_id = 1;
  // Conversation source_id from the inbox / conversation row.
  optional uint64 source_id = 2;
  // Observed as 1 in current traffic; semantics not fully confirmed.
  optional uint64 reserved_3 = 3;
  // Server-assigned message ID (same as ConversationMessageEntry.server_message_id).
  optional uint64 server_message_id = 4;
}

// Delete response: only the outer status code is modeled for now.
message DeleteMessageResponse {
  optional uint64 status = 1;
}

// Common REST request envelope for the type-705 reaction mutation call.
message ReactionRequest {
  // 705 = set_property / reaction mutation.
  optional uint64 message_type = 1;
  // Observed as 10008 for reactions.
  optional uint64 sub_command = 2;
  optional string client_version = 3;
  optional EmptyMessage options = 4;
  optional uint64 platform_flag = 5;
  optional uint64 reserved_6 = 6;
  // Present but empty in current traffic.
  optional string git_hash = 7;
  optional ReactionRequestPayload payload = 8;
  optional string device_id = 9;
  optional string client_platform = 11;
  // Includes tt-ticket-guard metadata, mirroring send.
  repeated MetadataKV metadata = 15;
  optional uint64 final_flag = 18;
}

// Typed payload wrapper for the type-705 request envelope.
message ReactionRequestPayload {
  optional ReactionWrapper wrapper = 705;
}

// Reaction wrapper observed at field 8 -> 705.
//
// Field 2 is literally the string "deprecated" in current traffic.
message ReactionWrapper {
  optional ReactionBody body = 1;
  optional string deprecated = 2;
}

// Inner reaction mutation body.
message ReactionBody {
  optional string conversation_id = 1;
  // Observed constant 1 in current traffic.
  optional uint64 action_flag = 2;
  // Conversation source ID from the inbox response.
  optional uint64 source_id = 3;
  optional uint64 server_message_id = 4;
  // Fresh client-generated UUID for the mutation request.
  optional string client_message_id = 5;
  // Repeated in the schema, though current requests send a single mutation.
  repeated ReactionMutation reactions = 6;
}

// One reaction add/remove mutation.
//
// Current wire shape: {1: action, 2: "e:<emoji>", 4: self_user_id}
message ReactionMutation {
  // 0 = add, 1 = remove.
  optional uint64 action = 1;
  // Encoded as "e:<emoji>" or occasionally "e:<alias>".
  optional string reaction_key = 2;
  // Decimal user ID string of the reacting user.
  optional string self_user_id = 4;
}

// Reaction summary attached to a fetched message.
//
// TikTok commonly emits two entries per logical reaction: one using the real
// Unicode emoji (for example "e:❤️") and one using a plain-text alias (for
// example "e:love"). The bridge deduplicates those after parsing.
message ReactionSummary {
  optional string reaction_key = 1;
  optional ReactionUsers users = 2;
}

// Container for the users who applied one reaction.
message ReactionUsers {
  repeated ReactionUser entries = 1;
}

// One user entry inside a reaction summary.
message ReactionUser {
  // Numeric user ID.
  optional uint64 user_id = 1;
  optional uint64 timestamp_s = 3;
  // Preferred decimal-string form of user_id when present.
  optional string user_id_str = 4;
  optional uint64 timestamp_us = 6;
}

// ---------------------------------------------------------------------------
// WebSocket outer envelope (LZ4 compressed transport)
// ---------------------------------------------------------------------------

// Top-level binary frame received from the TikTok IM WebSocket.
//
// This is *not* the chat payload itself — it is an outer transport envelope.
// The actual IM protobuf sits inside field 8, optionally LZ4-block-compressed
// (signalled by field 6 = "__lz4").
message WebsocketOuterFrame {
  optional uint64 stream_id = 1;
  optional uint64 sequence = 2;
  optional uint64 flag_3 = 3;
  optional uint64 flag_4 = 4;
  // Header map (repeated key/value). Examples: x_frontier_msg_id, traceparent.
  repeated WebsocketHeader headers = 5;
  // Compression algorithm tag. When this equals "__lz4", field 8 contains an
  // LZ4 raw-block-compressed protobuf; otherwise field 8 is raw protobuf.
  optional bytes compression = 6;
  optional WebsocketMeta meta = 7;
  // Primary payload: inner protobuf, possibly LZ4-compressed.
  optional bytes payload = 8;
  optional bytes trace_9 = 9;
  optional bytes trace_10 = 10;
  optional bytes trace_11 = 11;
  optional uint64 reserved_12 = 12;
  optional uint64 reserved_13 = 13;
  optional WebsocketMeta reserved_14 = 14;
}

// Repeated header entry inside the outer envelope (field 5).
message WebsocketHeader {
  optional bytes name = 1;
  optional bytes value = 2;
}

// Small nested metadata message (field 7 / 14 of the outer envelope).
message WebsocketMeta {
  optional uint64 value = 14;
}

// ---------------------------------------------------------------------------
// WebSocket inner protobuf (after LZ4 decompression)
// ---------------------------------------------------------------------------

// Top-level inner protobuf decoded from the WebSocket payload.
//
// Chat events currently arrive under field 8.
message WebsocketFrame {
  optional WebsocketEnvelope envelope = 8;
}

// WebSocket content envelope.
//
// field 1 identifies the inner event type. The bridge currently handles:
// - 500: chat message
// - 705: property mutation (reactions)
message WebsocketEnvelope {
  optional uint64 inner_type = 1;
  optional WebsocketCommands commands = 6;
}

// WebSocket command container.
message WebsocketCommands {
  optional WebsocketChat chat = 500;
  optional WebsocketPropertyUpdate property_update = 705;
}

// WebSocket chat event container.
message WebsocketChat {
  optional string conversation_id = 2;
  optional WebsocketMessageDetail detail = 5;
}

// Message detail carried by a type-500 WebSocket chat event.
//
// This is close to ConversationMessageEntry but not identical: reactions are
// delivered through different WS events, so they are not modeled here.
//
// content_json is usually a chat body (aweType, text, …) but can instead be a
// command envelope, e.g. {"command_type":2,"conversation_id":"…",
// "message_id":<uint64>,…} for an unsend/delete notification (message_id is the
// deleted server message id).
message WebsocketMessageDetail {
  optional uint64 server_message_id = 3;
  optional uint64 timestamp_us = 4;
  optional uint64 send_chain_id = 5;
  optional uint64 sender_user_id = 7;
  // JSON message blob parsed separately by parseMessageContent or command handlers.
  optional bytes content_json = 8;
  // Repeated tag pairs; s:client_message_id is used as the stable message key.
  repeated MetadataTag tags = 9;
  optional string sender_sec_uid = 14;
  // Same shape as ConversationMessageEntry.message_reply (reply / quote).
  optional MessageReplyReference message_reply = 18;
  // Outer attachment payload; field 7 currently carries sticker metadata.
  optional MessageAttachmentPayload attachment = 20;
  // Observed as "sticker", "private_image", and "private_video" in current captures.
  optional string message_subtype = 21;
  // Private DM media metadata (encrypted image URLs or direct video URLs).
  optional PrivateImageAttachment private_image = 24;
  optional uint64 cursor_ts_us = 25;
}

// Property-update container carried by inner_type 705.
//
// Reactions arrive as s:property_modify in the tag list; the value is a JSON
// blob describing which emojis were added or removed.
message WebsocketPropertyUpdate {
  optional string conversation_id = 1;
  optional uint64 message_kind = 2;
  optional uint64 reserved_3 = 3;
  optional uint64 reserved_4 = 4;
  optional bytes content_json = 5;
  // Repeated tag pairs — s:property_modify carries the reaction JSON.
  repeated MetadataTag tags = 6;
}
