services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspaces/matrix-tiktok:cached
    command: sleep infinity
    environment:
      DATABASE_URL: postgres://bridge:tiktok@db:5432/matrix?sslmode=disable
      PGHOST: db
      PGPORT: "5432"
      PGUSER: bridge
      PGPASSWORD: tiktok
      PGDATABASE: matrix
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: bridge
      POSTGRES_PASSWORD: tiktok
      POSTGRES_DB: matrix
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bridge -d matrix"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
